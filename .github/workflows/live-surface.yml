name: Live Surface

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-live-surface:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify live domain serves expected surface
        run: node .github/scripts/verify-live-surface.mjs
